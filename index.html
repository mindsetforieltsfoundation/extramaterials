<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bảng điều khiển bài tập — Toàn khoá</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=202607021520">
</head>
<body>
<div class="dash-hero">
  <div class="eyebrow">Mindset for IELTS Foundation · Extra Materials</div>
  <h1>📚 Bài tập tương tác</h1>
  <p>Chọn Unit → bấm vào từng module để mở bài tập → làm bài bất kỳ, thứ tự tùy ý.</p>
  <div id="overallPill" class="overall-pill">Chưa làm bài nào</div>
</div>

<div class="unit-tabs" id="unitTabs"></div>

<main style="max-width:920px;">
  <div id="modules"></div>
  <div style="text-align:center;">
    <button class="reset-all" id="resetAllBtn">🗑 Xoá toàn bộ điểm đã lưu</button>
  </div>
</main>
<footer class="page-footer">Điểm được lưu ngay trên trình duyệt này (localStorage) — mỗi học sinh nên dùng máy/trình duyệt riêng.</footer>

<script src="scores.js?v=202607021520"></script>
<script>
const MODULE_COLORS = {
  gv: { c: "#2F7A78", soft: "#EAF3F2" },
  lb: { c: "#3E8F62", soft: "#E4F3EA" },
  ls: { c: "#D98E04", soft: "#FBF0DA" },
  rw: { c: "#7A4FA3", soft: "#F0E9F6" },
};
const MODULE_ICONS = { gv: "🔤", lb: "🧩", ls: "🎧", rw: "📖" };

const UNITS = [
  {
    key: "u1", name: "Unit 1 — Daily Life", available: true,
    modules: [
      { key: "gv", name: "Grammar & Vocab", file: "unit1-full-4modules/grammar-vocab.html",
        titles: ["Telling the time","Rearrange the letters","Make or Do?","Complete the email","Third person forms","Choose the correct answer","Word order","Complete the email — job"] },
      { key: "lb", name: "Language Builder", file: "unit1-full-4modules/language-builder.html",
        titles: ["Places in a building","Places near college","Match the opposites","Complete conversations","Sandra's tour","Complete Sandra's tour","Ask about the college","Word order","Correct the mistakes"] },
      { key: "ls", name: "Listening & Speaking", file: "unit1-full-4modules/listening-speaking.html",
        titles: ["Daily activities","Adverbs of frequency","Everyday verbs","Sanjay's flatmates","Mary's family","Verb groups","Word order","Match sentence halves"] },
      { key: "rw", name: "Reading & Writing", file: "unit1-full-4modules/reading-writing.html",
        titles: ["Match activities","Paragraph matching","Alessia's email","Comprehension","Michael & Emma","Present simple","Adverbs of frequency","Email phrases","Label email parts"] },
    ],
  },
  {
    key: "u2", name: "Unit 2 — House & Home / Family", available: true,
    modules: [
      { key: "gv", name: "Grammar & Vocab", file: "unit-2/grammar-vocab.html", prefix: "u2gv",
        titles: ["Rooms of the house","Choose the correct label","Match Q&A","Word search","Correct the mistake","Rewrite as questions","Find and rewrite the mistake","Word order"] },
      { key: "lb", name: "Language Builder", file: "unit-2/language-builder.html", prefix: "u2lb",
        titles: ["Family relationships","Formal/informal words","Tamsin's family","Family tree","Amanda's photos","Be — short forms","Match Q&A","Word order","Short forms"] },
      { key: "ls", name: "Listening & Speaking", file: "unit-2/listening-speaking.html", prefix: "u2ls",
        titles: ["Housing activities","Choose the correct numbers","Spelling names","House description","Contact details","Word stress","Match phrases","Rachel's ad","Word order","Speaking"] },
      { key: "rw", name: "Reading & Writing", file: "unit-2/reading-writing.html", prefix: "u2rw",
        titles: ["Room furniture","Haruka's email","Accommodation types","Best fit","Rosa's house","Prepositions (letters)","Choose preposition","Present simple be","Word order","Writing"] },
    ],
  },
  { key: "u3", name: "Unit 3 — Sports / Food & Drink", available: true,
    modules: [
      { key: "gv", name: "Grammar & Vocab", file: "unit-3/grammar-vocab.html", prefix: "u3gv",
        titles: ["Sports activities","Play, Do or Go?","Sports verbs","Cricket","Odd word out","Verb forms","Sentence halves","Simple vs continuous","Katy's email","Short answers"] },
      { key: "lb", name: "Language Builder", file: "unit-3/language-builder.html", prefix: "u3lb",
        titles: ["Containers","Food labels","Meal words","Complete conversations","Cafeteria order","Sort questions","Match Q&A","Word order","Correct answers","Speaking"] },
      { key: "ls", name: "Listening & Speaking", file: "unit-3/listening-speaking.html", prefix: "u3ls",
        titles: ["Simple or continuous?","Verb + phrase","Feelings about activities","Peter's holiday","Choose correct tense","Word stress","Play/Do/Go","Present continuous","Picture description","Speaking"] },
      { key: "rw", name: "Reading & Writing", file: "unit-3/reading-writing.html", prefix: "u3rw",
        titles: ["Activities","College clubs","Rachel's letter","Rachel comprehension","Word order","Susie's adjectives","Susie's letter parts","Writing"] },
    ],
  },
  { key: "u4", name: "Unit 4 — Holidays / Personality", available: true,
    modules: [
      { key: "gv", name: "Grammar & Vocab", file: "unit-4/grammar-vocab.html", prefix: "u4gv",
        titles: ["Types of holiday","Holiday activities sort","Complete sentences","Adjectives","Conversation","Sarah's email","Sentence halves","Because/So"] },
      { key: "lb", name: "Language Builder", file: "unit-4/language-builder.html", prefix: "u4lb",
        titles: ["Free time nouns","Verb + -ing","Sentence halves","Adjectives","William's friends","Phrases","True/False","Word order","Correct mistakes","Writing"] },
      { key: "ls", name: "Listening & Speaking", file: "unit-4/listening-speaking.html", prefix: "u4ls",
        titles: ["Kinds of holiday","Activities","Simple present/past","John's reasons","Cristina's holiday","-ed pronunciation","Word order","Correct word","So/Because","Speaking"] },
      { key: "rw", name: "Reading & Writing", file: "unit-4/reading-writing.html", prefix: "u4rw",
        titles: ["Places","Nature Museum","Burj Khalifa verbs","Tom's postcard","Tivoli headings","Word order","Prepositions","Sentence halves","Burj Khalifa paragraphs","Writing"] },
    ],
  },
  { key: "u5", name: "Unit 5 — Food / Jobs", available: true,
    modules: [
      { key: "gv", name: "Grammar & Vocab", file: "unit-5/grammar-vocab.html", prefix: "u5gv",
        titles: ["Food items","Food categories","Cooking verbs","A/an/some/any","A lot of/many/much","Choose correct word","Pizza text","Recipe order"] },
      { key: "lb", name: "Language Builder", file: "unit-5/language-builder.html", prefix: "u5lb",
        titles: ["Jobs","Workplaces","Job verbs","School subjects","Best job","Hamish","Sara's email","Correct prepositions","Writing","Speaking"] },
      { key: "ls", name: "Listening & Speaking", file: "unit-5/listening-speaking.html", prefix: "u5ls",
        titles: ["World dishes","Conversations","Cooking actions","Famous dishes","Paella recipe","Spelling","A/an/some","Cooking instructions","Moussaka","Speaking"] },
      { key: "rw", name: "Reading & Writing", file: "unit-5/reading-writing.html", prefix: "u5rw",
        titles: ["Food types","Richard's letter","Jenny's email","Street food","Food around the world","Word order","Countable/uncountable","Correct form","Paragraph matching","Writing"] },
    ],
  },
  { key: "u6", name: "Unit 6", available: false, modules: [] },
  { key: "u7", name: "Unit 7", available: false, modules: [] },
  { key: "u8", name: "Unit 8", available: false, modules: [] },
  { key: "u9", name: "Unit 9", available: false, modules: [] },
  { key: "u10", name: "Unit 10", available: false, modules: [] },
];

let currentUnit = "u1";
let openModules = new Set(); // keys like "u1-gv" that are expanded

function scoreIdFor(mod, i) {
  const prefix = mod.prefix || mod.key;
  return `${prefix}-${i + 1}`;
}

function ringSvg(pct, color) {
  const r = 17, c = 2 * Math.PI * r;
  const offset = c * (1 - pct / 100);
  return `
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="${r}" fill="none" stroke="#E5E6DF" stroke-width="4"/>
      <circle cx="22" cy="22" r="${r}" fill="none" stroke="${color}" stroke-width="4"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
    </svg>`;
}

function renderTabs() {
  const tabs = document.getElementById("unitTabs");
  tabs.innerHTML = "";
  UNITS.forEach(u => {
    const b = document.createElement("button");
    b.className = "unit-tab" + (u.key === currentUnit ? " active" : "") + (!u.available ? " locked" : "");
    b.textContent = u.available ? u.name.replace(/Unit \d+ — /, `U${u.key.slice(1)}: `) : `${u.name} 🔒`;
    b.title = u.available ? "" : "Sắp có";
    if (u.available) b.onclick = () => { currentUnit = u.key; render(); };
    tabs.appendChild(b);
  });
}

function render() {
  renderTabs();
  const container = document.getElementById("modules");
  container.innerHTML = "";
  const all = Scores.allEntries();
  const unit = UNITS.find(u => u.key === currentUnit);

  if (!unit.available) {
    container.innerHTML = `<p style="text-align:center;color:#9aa2b1;padding:40px;">Unit này đang được xây dựng — sẽ cập nhật sớm.</p>`;
    updateOverallPill(all);
    return;
  }

  unit.modules.forEach(mod => {
    const modKey = `${unit.key}-${mod.key}`;
    const isOpen = openModules.has(modKey);
    const colors = MODULE_COLORS[mod.key] || MODULE_COLORS.gv;
    const icon = MODULE_ICONS[mod.key] || "📘";

    const doneCount = mod.titles.filter((_, i) => all[scoreIdFor(mod, i)] && all[scoreIdFor(mod, i)].pct === 100).length;
    const sumPct = mod.titles.reduce((s, _, i) => s + (all[scoreIdFor(mod, i)] ? all[scoreIdFor(mod, i)].pct : 0), 0);
    const avgPct = Math.round(sumPct / mod.titles.length);

    const block = document.createElement("div");
    block.className = "module-block" + (isOpen ? " open" : "");
    block.style.setProperty("--module-color", colors.c);
    block.style.setProperty("--module-color-soft", colors.soft);

    const header = document.createElement("div");
    header.className = "module-header";
    header.innerHTML = `
      <div class="module-icon">${icon}</div>
      <div class="module-info">
        <div class="mtitle">${mod.name}</div>
        <div class="msub">${doneCount}/${mod.titles.length} bài hoàn thành 100%</div>
      </div>
      <div class="module-ring">${ringSvg(avgPct, colors.c)}<div class="ring-pct">${avgPct}%</div></div>
      <div class="module-chevron">⌄</div>
    `;
    header.onclick = () => {
      if (openModules.has(modKey)) openModules.delete(modKey);
      else openModules.add(modKey);
      render();
    };

    const body = document.createElement("div");
    body.className = "module-body";
    const bodyInner = document.createElement("div");
    bodyInner.className = "module-body-inner";

    mod.titles.forEach((title, i) => {
      const id = scoreIdFor(mod, i);
      const entry = all[id];
      const pct = entry ? entry.pct : null;
      const status = pct === null ? "todo" : (pct === 100 ? "done" : "progress");
      const statusLabel = pct === null ? "Chưa làm" : (pct === 100 ? "✔ Hoàn thành" : `${pct}% đúng`);

      const a = document.createElement("a");
      a.className = `ex-card status-${status}`;
      a.href = `${mod.file}#ex${i + 1}`;
      a.innerHTML = `
        <div class="ex-num">EX.${i + 1}</div>
        <div class="ex-title">${title}</div>
        <div class="ex-status">${statusLabel}</div>
        <div class="bar"><div class="bar-fill" style="width:${pct || 0}%"></div></div>
      `;
      bodyInner.appendChild(a);
    });

    body.appendChild(bodyInner);
    block.appendChild(header);
    block.appendChild(body);
    container.appendChild(block);
  });

  updateOverallPill(all);
}

function updateOverallPill(all) {
  const overall = Scores.overallPct();
  document.getElementById("overallPill").textContent =
    overall === null ? "Chưa làm bài nào" : `📊 Điểm trung bình chung (tất cả unit): ${overall}%`;
}

document.getElementById("resetAllBtn").onclick = () => {
  if (confirm("Xoá toàn bộ điểm đã lưu trên trình duyệt này?")) {
    Scores.reset();
    render();
  }
};

// Open the first module of the current unit by default for discoverability
openModules.add("u1-gv");
render();
</script>
</body>
</html>
