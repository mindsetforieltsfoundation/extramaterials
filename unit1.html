<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 1 — Daily Life | Bài tập tương tác</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <h1>📘 Unit 1 — Daily Life</h1>
  <a href="index.html">← Về trang chủ</a>
</div>
<main id="app"></main>
<footer class="page-footer">Mindset for IELTS Foundation — Bài tập tương tác chuyển từ unit_1.docx</footer>

<script src="app.js"></script>
<script>
const app = document.getElementById("app");

function exerciseBlock(num, title, instr) {
  const box = document.createElement("div");
  box.className = "exercise";
  const h2 = document.createElement("h2");
  h2.innerHTML = `<span class="badge">Exercise ${num}</span> ${title}`;
  box.appendChild(h2);
  if (instr) box.appendChild(Object.assign(document.createElement("p"), { className: "instr", textContent: instr }));
  app.appendChild(box);
  return box;
}

/* Exercise 1: Match digital times with words */
{
  const box = exerciseBlock(1, "Telling the time", "Nối giờ số với cách đọc bằng chữ.");
  buildMatching(box, {
    leftLabel: "Giờ (số)",
    rightLabel: "Cách đọc (chữ)",
    pairs: [
      { left: "08:50", right: "ten to nine" },
      { left: "04:55", right: "five to five" },
      { left: "02:30", right: "half past two" },
      { left: "09:10", right: "ten past nine" },
      { left: "06:45", right: "a quarter to seven" },
      { left: "05:15", right: "a quarter past five" },
      { left: "08:20", right: "twenty past eight" },
      { left: "10:05", right: "five past ten" },
      { left: "03:25", right: "twenty-five to four" },
      { left: "12:00", right: "twelve o'clock" },
    ],
  });
}

/* Exercise 2: Complete the text with correct verb forms (unscramble concept simplified to fill blank with word bank shown) */
{
  const box = exerciseBlock(2, "Complete the text", "Điền đúng động từ vào chỗ trống (gợi ý: have, brush, meet, catch, leave, go, watch, do, go to, fall).");
  buildFillBlank(box, {
    prefixLabel: true,
    lines: [
      { text: "Every morning I ____ a shower and get dressed.", answers: ["have"] },
      { text: "I ____ my teeth after breakfast.", answers: ["brush"] },
      { text: "I usually ____ my friends at the bus stop.", answers: ["meet"] },
      { text: "We ____ the bus to school together.", answers: ["catch"] },
      { text: "In the evening I ____ home at about 5 p.m.", answers: ["leave"] },
      { text: "After dinner I ____ TV for an hour.", answers: ["watch"] },
      { text: "Then I ____ my homework.", answers: ["do"] },
      { text: "I ____ bed at 10 p.m.", answers: ["go to", "go"] },
      { text: "I usually ____ asleep very quickly.", answers: ["fall"] },
    ],
  });
}

/* Exercise 3: Sort make/do collocations */
{
  const box = exerciseBlock(3, "Make or Do?", "Xếp mỗi cụm từ vào đúng cột MAKE hoặc DO.");
  buildSort2(box, {
    columns: ["make", "do"],
    items: [
      { text: "the bed", col: "make" },
      { text: "lunch", col: "make" },
      { text: "dinner", col: "make" },
      { text: "a mess", col: "make" },
      { text: "a cake", col: "make" },
      { text: "the cleaning", col: "do" },
      { text: "the housework", col: "do" },
      { text: "some homework", col: "do" },
      { text: "the shopping", col: "do" },
      { text: "the laundry", col: "do" },
    ],
  });
}

/* Exercise 4: Complete the email (Harry) */
{
  const box = exerciseBlock(4, "Complete the email", "Điền đúng động từ vào email của Harry (gợi ý: catch, finish, get up, go out, have, leave, live, meet, walk, work).");
  buildFillBlank(box, {
    prefixLabel: true,
    lines: [
      { text: "I ____ with a French family this year.", answers: ["live"] },
      { text: "I ____ up at 7 a.m. every day.", answers: ["get"] },
      { text: "I ____ breakfast with the family.", answers: ["have"] },
      { text: "Then I ____ to school — it only takes 10 minutes.", answers: ["walk"] },
      { text: "Sometimes I ____ the bus if it's raining.", answers: ["catch"] },
      { text: "School ____ at 4 p.m.", answers: ["finish"] },
      { text: "After school I ____ my friends in town.", answers: ["meet"] },
      { text: "My host father ____ in a bank in the city centre.", answers: ["work", "works"] },
      { text: "At the weekend we sometimes ____ to the cinema.", answers: ["go out"] },
      { text: "I ____ home at 10 p.m. — I'm always tired!", answers: ["leave"] },
    ],
  });
}

/* Exercise 5: Third person verb forms */
{
  const box = exerciseBlock(5, "Third person singular", "Chia đúng động từ trong ngoặc sang ngôi thứ 3 số ít.");
  buildFillBlank(box, {
    prefixLabel: true,
    lines: [
      { text: "She always ____ (wash) her hands before dinner.", answers: ["washes"] },
      { text: "He ____ (watch) TV every evening.", answers: ["watches"] },
      { text: "My little brother ____ (cry) when he's tired.", answers: ["cries"] },
      { text: "She ____ (practise) the piano every day.", answers: ["practises", "practices"] },
      { text: "He ____ (go) to school by bus.", answers: ["goes"] },
      { text: "My mum ____ (do) the shopping on Saturdays.", answers: ["does"] },
      { text: "The dog ____ (catch) the ball every time.", answers: ["catches"] },
      { text: "He never ____ (relax) at the weekend.", answers: ["relaxes"] },
      { text: "She always ____ (give) us good advice.", answers: ["gives"] },
      { text: "He ____ (switch off) the light before he leaves.", answers: ["switches off", "switches"] },
    ],
  });
}

/* Exercise 6: Choose the correct answer */
{
  const box = exerciseBlock(6, "Choose the correct verb form", "Chọn đáp án đúng.");
  buildMCQ(box, {
    questions: [
      { text: "My father ____ in a large office in the city.", options: ["work", "works"], answer: "works" },
      { text: "We ____ football every weekend.", options: ["play", "plays"], answer: "play" },
      { text: "She ____ hard for her exams every year.", options: ["study", "studies"], answer: "studies" },
      { text: "My friends ____ to visit me every summer.", options: ["come", "comes"], answer: "come" },
      { text: "School ____ at 8 a.m. and ____ at 3 p.m.", options: ["begin / finish", "begins / finishes"], answer: "begins / finishes" },
      { text: "I really ____ my new job.", options: ["like", "likes"], answer: "like" },
      { text: "He always ____ early on Mondays.", options: ["get up", "gets up"], answer: "gets up" },
      { text: "They ____ a big house near the beach.", options: ["have", "has"], answer: "have" },
      { text: "My mum ____ the best cakes in town.", options: ["make", "makes"], answer: "makes" },
      { text: "She always ____ smart clothes to work.", options: ["wear", "wears"], answer: "wears" },
    ],
  });
}

/* Exercise 7: Word order */
{
  const box = exerciseBlock(7, "Put the words in order", "Bấm các từ theo đúng thứ tự để tạo câu hoàn chỉnh.");
  buildWordOrder(box, {
    items: [
      { words: ["My", "friend", "always", "tidies", "his", "room"], answer: "My friend always tidies his room" },
      { words: ["I", "often", "for", "college", "late", "am"], answer: "I am often late for college" },
      { words: ["We", "never", "TV", "watch", "in", "the", "morning"], answer: "We never watch TV in the morning" },
      { words: ["Does", "he", "usually", "get", "up", "early", "?"], answer: "Does he usually get up early ?" },
      { words: ["She", "sometimes", "helps", "her", "mum", "cook", "dinner"], answer: "She sometimes helps her mum cook dinner" },
    ],
  });
}

/* Exercise 8: Complete the email (new job) */
{
  const box = exerciseBlock(8, "Complete the email — My new job", "Điền đúng từ vào email (gợi ý: clean, enjoy, finish, gets, have, opens, shouts, start, tells, work).");
  buildFillBlank(box, {
    prefixLabel: true,
    lines: [
      { text: "I've got a new job! I ____ there every Saturday.", answers: ["work"] },
      { text: "I ____ at 8 a.m.", answers: ["start"] },
      { text: "The shop ____ at 9 a.m.", answers: ["opens"] },
      { text: "I tidy and fill the shelves, ____ the floors and work at the checkout.", answers: ["clean"] },
      { text: "My manager is very nice. She ____ me what to do...", answers: ["tells"] },
      { text: "...and never ____.", answers: ["shouts"] },
      { text: "We ____ three breaks a day...", answers: ["have"] },
      { text: "...and ____ at 4 p.m.", answers: ["finish"] },
      { text: "It's hard work because the shop ____ very busy...", answers: ["gets"] },
      { text: "...but I really ____ it.", answers: ["enjoy"] },
    ],
  });
}
</script>
</body>
</html>
