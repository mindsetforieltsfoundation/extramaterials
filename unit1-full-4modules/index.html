<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng điều khiển bài tập — Unit 1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dash-hero">
  <h1>📚 Bài tập tương tác — Unit 1</h1>
  <p>4 module · 38 bài tập · Chọn bài bất kỳ, làm theo thứ tự tùy ý.</p>
  <div id="overallPill" class="overall-pill">Chưa làm bài nào</div>
</div>

<main style="max-width:920px;">
  <div id="modules"></div>
  <div style="text-align:center;">
    <button class="reset-all" id="resetAllBtn">🗑 Xoá toàn bộ điểm đã lưu</button>
  </div>
</main>
<footer class="page-footer">Điểm được lưu ngay trên trình duyệt này (localStorage) — mỗi học sinh nên dùng máy/trình duyệt riêng để không ghi đè điểm của nhau.</footer>

<script src="scores.js"></script>
<script>
const MODULES = [
  { key: "gv", name: "Module 1 — Grammar & Vocab", file: "grammar-vocab.html", icon: "🟦", n: 8 },
  { key: "lb", name: "Module 2 — Language Builder", file: "language-builder.html", icon: "🟩", n: 9 }, // ex10 is free-writing, not scored
  { key: "ls", name: "Module 3 — Listening & Speaking", file: "listening-speaking.html", icon: "🟨", n: 8 }, // ex9,10 free-writing/speaking
  { key: "rw", name: "Module 4 — Reading & Writing", file: "reading-writing.html", icon: "🟪", n: 9 }, // ex10 free-writing
];

const TITLES = {
  gv: ["Telling the time","Rearrange the letters","Make or Do?","Complete the email","Third person forms","Choose the correct answer","Word order","Complete the email — job"],
  lb: ["Places in a building","Places near college","Match the opposites","Complete conversations","Sandra's tour","Complete Sandra's tour","Ask about the college","Word order","Correct the mistakes"],
  ls: ["Daily activities","Adverbs of frequency","Everyday verbs","Sanjay's flatmates","Mary's family","Verb groups","Word order","Match sentence halves"],
  rw: ["Match activities","Paragraph matching","Alessia's email","Comprehension","Michael & Emma","Present simple","Adverbs of frequency","Email phrases","Label email parts"],
};

function render() {
  const container = document.getElementById("modules");
  container.innerHTML = "";
  const all = Scores.allEntries();

  MODULES.forEach(mod => {
    const sec = document.createElement("div");
    sec.className = "module-section";
    const doneCount = TITLES[mod.key].filter((_, i) => all[`${mod.key}-${i + 1}`]).length;
    sec.innerHTML = `<h2>${mod.icon} ${mod.name} <span style="font-weight:400;font-size:.8rem;color:#6b7280;">(${doneCount}/${TITLES[mod.key].length} đã làm)</span></h2>`;
    const grid = document.createElement("div");
    grid.className = "ex-grid";
    TITLES[mod.key].forEach((title, i) => {
      const id = `${mod.key}-${i + 1}`;
      const entry = all[id];
      const a = document.createElement("a");
      a.className = "ex-card";
      a.href = `${mod.file}#ex${i + 1}`;
      const pct = entry ? entry.pct : null;
      a.innerHTML = `
        <div class="ex-title">Ex.${i + 1} — ${title}</div>
        <div class="ex-pct ${pct !== null ? "done" : ""}">${pct !== null ? `✔ ${pct}% (${entry.correct}/${entry.total})` : "Chưa làm"}</div>
        <div class="bar"><div class="bar-fill" style="width:${pct || 0}%"></div></div>
      `;
      grid.appendChild(a);
    });
    sec.appendChild(grid);
    container.appendChild(sec);
  });

  const overall = Scores.overallPct();
  document.getElementById("overallPill").textContent =
    overall === null ? "Chưa làm bài nào" : `📊 Điểm trung bình chung: ${overall}%`;
}

document.getElementById("resetAllBtn").onclick = () => {
  if (confirm("Xoá toàn bộ điểm đã lưu trên trình duyệt này?")) {
    Scores.reset();
    render();
  }
};

render();
</script>
</body>
</html>
